<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Panel de contenidos — Escuela Con Confianza</title>
<style>
  :root {
    --verde: #0e7c66;
    --verde-oscuro: #0a5c4c;
    --verde-suave: #e6f4f1;
    --fondo: #f6f9f8;
    --texto: #1f2d2a;
    --gris: #6b7c78;
    --borde: #d9e5e2;
    --rojo: #c0392b;
    --amarillo: #fff7e0;
    --radio: 14px;
    --sombra: 0 2px 10px rgba(20, 60, 50, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--fondo);
    color: var(--texto);
    min-height: 100vh;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea {
    font-family: inherit;
    font-size: 1rem;
    padding: 12px 14px;
    border: 2px solid var(--borde);
    border-radius: 10px;
    width: 100%;
    background: #fff;
    color: var(--texto);
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--verde);
  }
  .oculto { display: none !important; }

  /* ---------- Pantalla de entrada ---------- */
  #vista-entrada {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .tarjeta-entrada {
    background: #fff;
    border-radius: var(--radio);
    box-shadow: var(--sombra);
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .tarjeta-entrada h1 { font-size: 1.4rem; margin-bottom: 6px; }
  .tarjeta-entrada p { color: var(--gris); margin-bottom: 24px; }
  .logo-circulo {
    width: 64px; height: 64px;
    background: var(--verde-suave);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    margin: 0 auto 16px;
  }
  #error-entrada {
    color: var(--rojo);
    margin-top: 12px;
    font-size: 0.95rem;
    min-height: 1.2em;
  }

  /* ---------- Botones ---------- */
  .boton {
    background: var(--verde);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 24px;
    font-size: 1.05rem;
    font-weight: 600;
    transition: background 0.15s;
  }
  .boton:hover { background: var(--verde-oscuro); }
  .boton:disabled { background: #9db8b2; cursor: wait; }
  .boton-secundario {
    background: #fff;
    color: var(--verde);
    border: 2px solid var(--verde);
  }
  .boton-secundario:hover { background: var(--verde-suave); }
  .boton-suave {
    background: none;
    border: none;
    font-size: 1.1rem;
    padding: 6px 8px;
    border-radius: 8px;
    color: var(--gris);
  }
  .boton-suave:hover { background: var(--verde-suave); color: var(--verde-oscuro); }

  /* ---------- Estructura principal ---------- */
  header {
    background: #fff;
    border-bottom: 1px solid var(--borde);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 1.15rem; }
  header .sub { color: var(--gris); font-size: 0.85rem; }
  main { max-width: 880px; margin: 0 auto; padding: 24px 16px 140px; }

  .pestanas {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .pestana {
    border: 2px solid var(--borde);
    background: #fff;
    border-radius: 999px;
    padding: 10px 22px;
    font-size: 1rem;
    font-weight: 600;
    color: var(--gris);
  }
  .pestana.activa {
    background: var(--verde);
    border-color: var(--verde);
    color: #fff;
  }

  .barra-seccion {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .barra-seccion h2 { font-size: 1.25rem; }
  .barra-seccion p { color: var(--gris); font-size: 0.92rem; margin-top: 2px; }

  /* ---------- Tarjetas de contenido ---------- */
  .lista { display: flex; flex-direction: column; gap: 12px; }
  .item {
    background: #fff;
    border-radius: var(--radio);
    box-shadow: var(--sombra);
    padding: 14px;
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .item img.miniatura {
    width: 120px;
    height: 68px;
    object-fit: cover;
    border-radius: 8px;
    background: var(--verde-suave);
    flex-shrink: 0;
  }
  .item .icono-grande {
    width: 68px; height: 68px;
    background: var(--verde-suave);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.7rem;
    flex-shrink: 0;
  }
  .item .cuerpo { flex: 1; min-width: 0; }
  .item .titulo { font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: var(--verde-suave);
    color: var(--verde-oscuro);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .chip.pendiente { background: var(--amarillo); color: #8a6d1a; }
  .item .acciones {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
  }
  .acciones-fila { display: flex; gap: 2px; }

  /* ---------- Formulario (ventana) ---------- */
  #velo {
    position: fixed;
    inset: 0;
    background: rgba(15, 40, 34, 0.45);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 30px 14px;
    overflow-y: auto;
    z-index: 50;
  }
  .ventana {
    background: #fff;
    border-radius: var(--radio);
    max-width: 560px;
    width: 100%;
    padding: 26px 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }
  .ventana h3 { font-size: 1.2rem; margin-bottom: 18px; }
  .campo { margin-bottom: 18px; }
  .campo label { display: block; font-weight: 600; margin-bottom: 6px; }
  .campo .ayuda { color: var(--gris); font-size: 0.85rem; margin-top: 5px; line-height: 1.4; }
  .vista-previa {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .vista-previa img {
    width: 150px;
    border-radius: 8px;
    display: block;
  }
  .vista-previa .estado-ok { color: var(--verde); font-weight: 600; font-size: 0.9rem; }
  .vista-previa .estado-mal { color: #8a6d1a; font-weight: 600; font-size: 0.9rem; }
  .opciones-casillas { display: flex; flex-direction: column; gap: 8px; }
  .opciones-casillas label, .opciones-radio label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-weight: 400;
    cursor: pointer;
    padding: 8px 10px;
    border-radius: 8px;
  }
  .opciones-casillas label:hover, .opciones-radio label:hover { background: var(--verde-suave); }
  .opciones-casillas input, .opciones-radio input {
    width: auto;
    margin-top: 3px;
    accent-color: var(--verde);
    transform: scale(1.25);
  }
  .opciones-radio { display: flex; flex-direction: column; gap: 8px; }
  .pie-ventana {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
  }
  .nota-archivo { font-size: 0.9rem; color: var(--verde-oscuro); margin-top: 6px; font-weight: 600; }
  .img-actual {
    width: 150px;
    border-radius: 8px;
    display: block;
    margin-bottom: 8px;
    border: 2px solid var(--borde);
  }
  .caja-ia {
    background: var(--verde-suave);
    border: 1px solid var(--borde);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 18px;
  }
  .caja-ia .titulo-ia { font-weight: 600; margin-bottom: 4px; }
  .caja-ia .ayuda { color: var(--gris); font-size: 0.85rem; margin-bottom: 10px; line-height: 1.4; }
  .caja-ia textarea {
    font-size: 0.9rem;
    background: #fff;
    resize: vertical;
    min-height: 96px;
    line-height: 1.45;
  }
  .caja-ia .boton-copiar {
    margin-top: 10px;
    width: 100%;
    background: var(--verde);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px;
    font-weight: 600;
    font-size: 1rem;
  }
  .caja-ia .boton-copiar:hover { background: var(--verde-oscuro); }
  .caja-ia .boton-copiar.copiado { background: #2e8b57; }

  /* ---------- Barra de publicar ---------- */
  #barra-publicar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--verde-oscuro);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    z-index: 40;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.15);
  }
  #barra-publicar .texto { font-weight: 600; }
  #barra-publicar .boton { background: #fff; color: var(--verde-oscuro); }
  #barra-publicar .boton:hover { background: var(--verde-suave); }
  #barra-publicar .descartar {
    background: none;
    border: none;
    color: #cfe8e2;
    text-decoration: underline;
    font-size: 0.95rem;
  }

  /* ---------- Aviso flotante ---------- */
  #aviso {
    position: fixed;
    top: 76px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--verde);
    color: #fff;
    padding: 14px 22px;
    border-radius: 12px;
    box-shadow: var(--sombra);
    font-weight: 600;
    z-index: 60;
    max-width: 90%;
    text-align: center;
  }
  #aviso.error { background: var(--rojo); }

  .vacio {
    text-align: center;
    color: var(--gris);
    padding: 40px 10px;
    background: #fff;
    border-radius: var(--radio);
  }
  @media (max-width: 560px) {
    .item { flex-direction: column; align-items: stretch; }
    .item img.miniatura { width: 100%; height: auto; }
    .item .acciones { flex-direction: row; justify-content: flex-end; }
  }
</style>
</head>
<body>

<!-- ============ ENTRADA ============ -->
<div id="vista-entrada">
  <div class="tarjeta-entrada">
    <div class="logo-circulo">🔑</div>
    <h1>Panel de contenidos</h1>
    <p>Escuela Con Confianza</p>
    <input type="password" id="campo-clave" placeholder="Contraseña" autocomplete="current-password">
    <div id="error-entrada"></div>
    <button class="boton" id="boton-entrar" style="width:100%; margin-top:10px;">Entrar</button>
  </div>
</div>

<!-- ============ PANEL ============ -->
<div id="vista-panel" class="oculto">
  <header>
    <div>
      <h1>Panel de contenidos</h1>
      <div class="sub">Los cambios se publican en escuelaconconfianza.com</div>
    </div>
    <button class="boton-secundario boton" id="boton-salir" style="padding:8px 16px; font-size:0.9rem;">Salir</button>
  </header>

  <main>
    <div class="pestanas">
      <button class="pestana activa" data-tipo="videos">🎬 Videos</button>
      <button class="pestana" data-tipo="guias">📄 Guías</button>
      <button class="pestana" data-tipo="articulos">📰 Publicaciones</button>
    </div>

    <div class="barra-seccion">
      <div>
        <h2 id="titulo-seccion">Videos</h2>
        <p id="descripcion-seccion"></p>
      </div>
      <button class="boton" id="boton-agregar">＋ Agregar</button>
    </div>

    <div id="contenedor-lista" class="lista"></div>
  </main>

  <div id="barra-publicar" class="oculto">
    <span class="texto">Tienes cambios sin publicar</span>
    <button class="boton" id="boton-publicar">Publicar ahora</button>
    <button class="descartar" id="boton-descartar">Descartar cambios</button>
  </div>
</div>

<div id="velo" class="oculto"></div>
<div id="aviso" class="oculto"></div>

<script>
"use strict";

/* ================= Estado ================= */
const API = "/api/panel";
let clave = sessionStorage.getItem("panel_clave") || "";
let datos = { videos: null, guias: null, articulos: null };
let publicado = { videos: null, guias: null, articulos: null };
let pestanaActual = "videos";

const CATEGORIAS = [
  ["destacados", "⭐ Destacados (aparece al inicio de Recursos)"],
  ["abordaje", "Abordaje"],
  ["podcast", "Podcast"],
  ["invitaciones", "Invitaciones"],
  ["familias", "Familias"],
  ["estrategias", "Estrategias"],
];
const PUBLICOS = [
  ["personas", "Personas con tartamudez"],
  ["familiares", "Familiares"],
  ["todos", "Todos"],
];
const ICONOS_GUIA = [
  ["fa-regular fa-file-lines", "📄 Documento"],
  ["fa-solid fa-user-group", "👥 Familia"],
  ["fa-solid fa-book-open", "📖 Libro abierto"],
  ["fa-solid fa-graduation-cap", "🎓 Educación"],
];
const DESCRIPCIONES = {
  videos: "Los videos de YouTube que se muestran en la página de Recursos.",
  guias: "Las guías en PDF o ZIP que la gente puede descargar.",
  articulos: "Las tarjetas de publicaciones de Recursos.",
};

/* ================= Utilidades ================= */
const $ = (sel) => document.querySelector(sel);

function escapar(texto) {
  const div = document.createElement("div");
  div.textContent = texto == null ? "" : String(texto);
  return div.innerHTML;
}

function crearId(titulo, existentes) {
  let base = String(titulo || "contenido")
    .toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "")
    .slice(0, 60) || "contenido";
  let id = base, n = 2;
  while (existentes.includes(id)) { id = base + "-" + n; n++; }
  return id;
}

function extraerYoutubeId(texto) {
  texto = String(texto || "").trim();
  if (!texto) return "";
  if (/^[A-Za-z0-9_-]{11}$/.test(texto)) return texto;
  const m = texto.match(
    /(?:youtube\.com\/(?:watch\?(?:.*&)?v=|shorts\/|embed\/|live\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/
  );
  return m ? m[1] : "";
}

function mostrarAviso(texto, esError) {
  const aviso = $("#aviso");
  aviso.textContent = texto;
  aviso.classList.toggle("error", !!esError);
  aviso.classList.remove("oculto");
  clearTimeout(mostrarAviso._t);
  mostrarAviso._t = setTimeout(() => aviso.classList.add("oculto"), 5000);
}

function copiar(objeto) { return JSON.parse(JSON.stringify(objeto)); }

function hayCambios() {
  return ["videos", "guias", "articulos"].some(
    (t) => datos[t] && JSON.stringify(datos[t]) !== JSON.stringify(publicado[t])
  );
}

function refrescarBarra() {
  $("#barra-publicar").classList.toggle("oculto", !hayCambios());
}

async function llamarApi(metodo, cuerpo, consulta) {
  const respuesta = await fetch(API + (consulta || ""), {
    method: metodo,
    headers: {
      "x-panel-clave": clave,
      ...(cuerpo ? { "content-type": "application/json" } : {}),
    },
    body: cuerpo ? JSON.stringify(cuerpo) : undefined,
  });
  const resultado = await respuesta.json().catch(() => ({ ok: false, mensaje: "Respuesta no válida." }));
  if (respuesta.status === 401) {
    sessionStorage.removeItem("panel_clave");
    throw new Error("La contraseña ya no es válida. Vuelve a entrar.");
  }
  if (!resultado.ok) throw new Error(resultado.mensaje || "Ocurrió un error.");
  return resultado;
}

function archivoABase64(archivo) {
  return new Promise((resolver, rechazar) => {
    const lector = new FileReader();
    lector.onload = () => resolver(String(lector.result).split(",")[1] || "");
    lector.onerror = () => rechazar(new Error("No se pudo leer el archivo."));
    lector.readAsDataURL(archivo);
  });
}

// Arma el texto listo para pegar en ChatGPT y generar la imagen de una publicación.
function generarPromptImagen(titulo, descripcion) {
  const tema = (titulo || "").trim() || "(escribe primero el título de la publicación)";
  const detalle = (descripcion || "").trim();
  return (
    "Crea una imagen horizontal en formato apaisado 16:9 (ideal para 1600 x 900 píxeles), " +
    "para acompañar una publicación de Escuela Con Confianza, una organización que acompaña " +
    "a personas con tartamudez.\n\n" +
    "Tema de la publicación: «" + tema + "».\n" +
    (detalle ? "Contexto: " + detalle + "\n" : "") +
    "\nEstilo: cálido, humano y profesional; tonos serenos (verdes suaves y neutros); " +
    "sensación de calma, confianza y respeto. Sin texto ni letras dentro de la imagen. " +
    "Coloca los elementos importantes hacia el centro, para que también se vea bien " +
    "recortada en un cuadrado central (versión para celular)."
  );
}

// Recorta y ajusta cualquier imagen al tamaño exacto que usa la web
// (recorte centrado, como "rellenar" en las apps de fotos). Devuelve JPEG en base64.
function procesarImagen(archivo, ancho, alto) {
  return new Promise((resolver, rechazar) => {
    const imagen = new Image();
    const urlTemporal = URL.createObjectURL(archivo);
    imagen.onload = () => {
      try {
        const lienzo = document.createElement("canvas");
        lienzo.width = ancho;
        lienzo.height = alto;
        const contexto = lienzo.getContext("2d");
        const escala = Math.max(ancho / imagen.width, alto / imagen.height);
        const anchoFinal = imagen.width * escala;
        const altoFinal = imagen.height * escala;
        contexto.drawImage(
          imagen,
          (ancho - anchoFinal) / 2,
          (alto - altoFinal) / 2,
          anchoFinal,
          altoFinal
        );
        resolver(lienzo.toDataURL("image/jpeg", 0.85).split(",")[1]);
      } catch (e) {
        rechazar(new Error("No se pudo procesar la imagen."));
      } finally {
        URL.revokeObjectURL(urlTemporal);
      }
    };
    imagen.onerror = () => {
      URL.revokeObjectURL(urlTemporal);
      rechazar(new Error("El archivo no parece ser una imagen válida."));
    };
    imagen.src = urlTemporal;
  });
}

/* ================= Entrada ================= */
async function entrar() {
  const boton = $("#boton-entrar");
  clave = $("#campo-clave").value.trim();
  if (!clave) { $("#error-entrada").textContent = "Escribe la contraseña."; return; }
  boton.disabled = true;
  boton.textContent = "Comprobando…";
  $("#error-entrada").textContent = "";
  try {
    await cargarTodo();
    sessionStorage.setItem("panel_clave", clave);
    $("#vista-entrada").classList.add("oculto");
    $("#vista-panel").classList.remove("oculto");
    pintarLista();
  } catch (e) {
    $("#error-entrada").textContent = e.message;
  } finally {
    boton.disabled = false;
    boton.textContent = "Entrar";
  }
}

async function cargarTodo() {
  const tipos = ["videos", "guias", "articulos"];
  const resultados = await Promise.all(
    tipos.map((t) => llamarApi("GET", null, "?tipo=" + t))
  );
  tipos.forEach((t, i) => {
    datos[t] = resultados[i].datos;
    publicado[t] = copiar(resultados[i].datos);
  });
}

/* ================= Pintar listas ================= */
function pintarLista() {
  $("#titulo-seccion").textContent =
    pestanaActual === "videos" ? "Videos" :
    pestanaActual === "guias" ? "Guías descargables" : "Publicaciones";
  $("#descripcion-seccion").textContent = DESCRIPCIONES[pestanaActual];

  const contenedor = $("#contenedor-lista");
  contenedor.innerHTML = "";
  const lista = (datos[pestanaActual] && datos[pestanaActual][pestanaActual]) || [];

  if (!lista.length) {
    contenedor.innerHTML = '<div class="vacio">Aún no hay nada aquí. Usa el botón “＋ Agregar”.</div>';
    refrescarBarra();
    return;
  }

  lista.forEach((elemento, indice) => {
    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML =
      miniaturaDe(elemento) +
      '<div class="cuerpo"><div class="titulo">' + escapar(elemento.title) + "</div>" +
      '<div class="chips">' + chipsDe(elemento) + "</div></div>" +
      '<div class="acciones">' +
      '<div class="acciones-fila">' +
      '<button class="boton-suave" title="Subir" data-accion="subir">▲</button>' +
      '<button class="boton-suave" title="Bajar" data-accion="bajar">▼</button>' +
      "</div>" +
      '<div class="acciones-fila">' +
      '<button class="boton-suave" title="Editar" data-accion="editar">✏️</button>' +
      '<button class="boton-suave" title="Quitar" data-accion="quitar">🗑️</button>' +
      "</div></div>";

    item.querySelectorAll("[data-accion]").forEach((boton) => {
      boton.addEventListener("click", () => accionItem(boton.dataset.accion, indice));
    });
    contenedor.appendChild(item);
  });
  refrescarBarra();
}

function miniaturaDe(elemento) {
  if (pestanaActual === "videos") {
    if (elemento.youtubeId) {
      return '<img class="miniatura" src="https://img.youtube.com/vi/' +
        escapar(elemento.youtubeId) + '/mqdefault.jpg" alt="">';
    }
    return '<div class="icono-grande">⏳</div>';
  }
  if (pestanaActual === "guias") {
    const icono = ICONOS_GUIA.find((i) => i[0] === elemento.icon);
    return '<div class="icono-grande">' + (icono ? icono[1].split(" ")[0] : "📄") + "</div>";
  }
  if (elemento.image) {
    return '<img class="miniatura" src="/' + escapar(elemento.image) + '" alt="">';
  }
  return '<div class="icono-grande">📰</div>';
}

function chipsDe(elemento) {
  const chips = [];
  if (pestanaActual === "videos") {
    if (!elemento.youtubeId) chips.push('<span class="chip pendiente">Pendiente: sin video</span>');
    if (elemento.use === "principal") chips.push('<span class="chip">★ Principal</span>');
    const publico = PUBLICOS.find((p) => p[0] === elemento.audience);
    if (publico) chips.push('<span class="chip">' + publico[1] + "</span>");
    (elemento.categories || []).forEach((c) => {
      const cat = CATEGORIAS.find((x) => x[0] === c);
      chips.push('<span class="chip">' + (cat ? cat[1].replace(" (aparece al inicio de Recursos)", "") : c) + "</span>");
    });
  } else if (pestanaActual === "guias") {
    if (elemento.description) chips.push('<span class="chip">' + escapar(elemento.description) + "</span>");
  } else {
    if (elemento.date) chips.push('<span class="chip">' + escapar(elemento.date) + "</span>");
    if (elemento.featured) chips.push('<span class="chip">⭐ En portada</span>');
    if (elemento.badge) chips.push('<span class="chip pendiente">' + escapar(elemento.badge) + "</span>");
  }
  return chips.join("");
}

function accionItem(accion, indice) {
  const lista = datos[pestanaActual][pestanaActual];
  if (accion === "subir" && indice > 0) {
    [lista[indice - 1], lista[indice]] = [lista[indice], lista[indice - 1]];
  } else if (accion === "bajar" && indice < lista.length - 1) {
    [lista[indice + 1], lista[indice]] = [lista[indice], lista[indice + 1]];
  } else if (accion === "quitar") {
    const titulo = lista[indice].title || "este elemento";
    if (!confirm('¿Quitar "' + titulo + '" de la web?\n\nNo se borra nada hasta que pulses "Publicar ahora".')) return;
    lista.splice(indice, 1);
  } else if (accion === "editar") {
    abrirFormulario(indice);
    return;
  }
  pintarLista();
}

/* ================= Formularios ================= */
function abrirFormulario(indice) {
  const editando = indice != null;
  const lista = datos[pestanaActual][pestanaActual];
  const elemento = editando ? lista[indice] : null;
  const velo = $("#velo");

  if (pestanaActual === "videos") velo.innerHTML = formularioVideo(elemento);
  else if (pestanaActual === "guias") velo.innerHTML = formularioGuia(elemento);
  else velo.innerHTML = formularioArticulo(elemento);

  velo.classList.remove("oculto");
  velo.querySelector("[data-cerrar]").addEventListener("click", cerrarFormulario);
  velo.querySelector("[data-guardar]").addEventListener("click", () => guardarFormulario(indice));

  if (pestanaActual === "videos") {
    const campoEnlace = velo.querySelector("#campo-enlace");
    campoEnlace.addEventListener("input", refrescarVistaPrevia);
    refrescarVistaPrevia();
  }

  if (pestanaActual === "articulos") {
    const campoPrompt = velo.querySelector("#campo-prompt-ia");
    const campoTitulo = velo.querySelector("#campo-titulo");
    const campoDescripcion = velo.querySelector("#campo-descripcion");
    const refrescarPrompt = () => {
      campoPrompt.value = generarPromptImagen(campoTitulo.value, campoDescripcion.value);
    };
    campoTitulo.addEventListener("input", refrescarPrompt);
    campoDescripcion.addEventListener("input", refrescarPrompt);
    refrescarPrompt();

    const botonCopiar = velo.querySelector("#boton-copiar-prompt");
    botonCopiar.addEventListener("click", async () => {
      try {
        campoPrompt.select();
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(campoPrompt.value);
        } else {
          document.execCommand("copy");
        }
        botonCopiar.textContent = "✅ ¡Copiado! Pégalo en ChatGPT";
        botonCopiar.classList.add("copiado");
        setTimeout(() => {
          botonCopiar.textContent = "📋 Copiar el texto para la IA";
          botonCopiar.classList.remove("copiado");
        }, 2500);
      } catch (e) {
        mostrarAviso("No se pudo copiar solo. Selecciona el texto y usa Ctrl+C.", true);
      }
    });
  }

  const campoArchivo = velo.querySelector("#campo-archivo");
  if (campoArchivo) {
    campoArchivo.addEventListener("change", () => {
      const nota = velo.querySelector("#nota-archivo");
      const archivo = campoArchivo.files[0];
      nota.textContent = archivo
        ? "Archivo elegido: " + archivo.name + " (" + (archivo.size / 1024 / 1024).toFixed(1) + " MB)"
        : "";
    });
  }
}

function cerrarFormulario() {
  $("#velo").classList.add("oculto");
  $("#velo").innerHTML = "";
}

function refrescarVistaPrevia() {
  const id = extraerYoutubeId($("#campo-enlace").value);
  const caja = $("#vista-previa-video");
  if (id) {
    caja.innerHTML = '<img src="https://img.youtube.com/vi/' + id +
      '/mqdefault.jpg" alt=""><span class="estado-ok">✓ Video detectado</span>';
  } else if ($("#campo-enlace").value.trim()) {
    caja.innerHTML = '<span class="estado-mal">No reconozco ese enlace. Copia el enlace del video desde YouTube.</span>';
  } else {
    caja.innerHTML = '<span class="estado-mal">Sin enlace: el video aparecerá como "Próximamente".</span>';
  }
}

function formularioVideo(v) {
  const categorias = CATEGORIAS.map(
    ([valor, etiqueta]) =>
      '<label><input type="checkbox" name="categoria" value="' + valor + '"' +
      (v && v.categories && v.categories.includes(valor) ? " checked" : "") +
      ">" + etiqueta + "</label>"
  ).join("");
  const publicos = PUBLICOS.map(
    ([valor, etiqueta]) =>
      '<option value="' + valor + '"' +
      (v && v.audience === valor ? " selected" : "") + ">" + etiqueta + "</option>"
  ).join("");
  return `<div class="ventana">
    <h3>${v ? "Editar video" : "Agregar video"}</h3>
    <div class="campo">
      <label>Enlace del video de YouTube</label>
      <input type="text" id="campo-enlace" placeholder="Pega aquí el enlace, ej. https://www.youtube.com/watch?v=..."
        value="${escapar(v ? (v.youtubeUrl || v.youtubeId) : "")}">
      <div class="vista-previa" id="vista-previa-video"></div>
      <div class="ayuda">Puedes dejarlo vacío si el video aún no está listo.</div>
    </div>
    <div class="campo">
      <label>Título del video</label>
      <input type="text" id="campo-titulo" value="${escapar(v ? v.title : "")}" placeholder="Ej. ¿Cómo manejar la ansiedad al hablar?">
    </div>
    <div class="campo">
      <label>¿Para quién es?</label>
      <select id="campo-publico">${publicos}</select>
    </div>
    <div class="campo">
      <label>¿En qué secciones aparece?</label>
      <div class="opciones-casillas">${categorias}</div>
    </div>
    <div class="campo">
      <label>¿Es el video principal de su sección?</label>
      <div class="opciones-radio">
        <label><input type="radio" name="rol" value="principal" ${v && v.use === "principal" ? "checked" : ""}>Sí, se reproduce en grande</label>
        <label><input type="radio" name="rol" value="secundario" ${!v || v.use !== "principal" ? "checked" : ""}>No, es un video relacionado</label>
      </div>
    </div>
    <div class="campo">
      <label>Duración (opcional)</label>
      <input type="text" id="campo-duracion" value="${escapar(v ? v.duration : "")}" placeholder="Ej. 12:30">
    </div>
    <div class="pie-ventana">
      <button class="boton boton-secundario" data-cerrar>Cancelar</button>
      <button class="boton" data-guardar>Guardar</button>
    </div>
  </div>`;
}

function formularioGuia(g) {
  const iconos = ICONOS_GUIA.map(
    ([valor, etiqueta]) =>
      '<option value="' + valor + '"' +
      (g && g.icon === valor ? " selected" : "") + ">" + etiqueta + "</option>"
  ).join("");
  return `<div class="ventana">
    <h3>${g ? "Editar guía" : "Agregar guía"}</h3>
    <div class="campo">
      <label>Título de la guía</label>
      <input type="text" id="campo-titulo" value="${escapar(g ? g.title : "")}" placeholder="Ej. Tartamudez infantil">
    </div>
    <div class="campo">
      <label>Descripción corta</label>
      <input type="text" id="campo-descripcion" value="${escapar(g ? g.description : "")}" placeholder="Ej. Dirigido a familiares de menores con tartamudez.">
    </div>
    <div class="campo">
      <label>Dibujito que la acompaña</label>
      <select id="campo-icono">${iconos}</select>
    </div>
    <div class="campo">
      <label>Archivo (PDF o ZIP)</label>
      <input type="file" id="campo-archivo" accept=".pdf,.zip">
      <div class="nota-archivo" id="nota-archivo"></div>
      <div class="ayuda">${g && g.downloadUrl
        ? "Ya tiene un archivo. Solo elige uno nuevo si quieres reemplazarlo."
        : "Elige el archivo que la gente descargará."}</div>
    </div>
    <div class="pie-ventana">
      <button class="boton boton-secundario" data-cerrar>Cancelar</button>
      <button class="boton" data-guardar>Guardar</button>
    </div>
  </div>`;
}

function formularioArticulo(a) {
  return `<div class="ventana">
    <h3>${a ? "Editar publicación" : "Agregar publicación"}</h3>
    <div class="campo">
      <label>Título</label>
      <input type="text" id="campo-titulo" value="${escapar(a ? a.title : "")}">
    </div>
    <div class="campo">
      <label>Descripción corta</label>
      <textarea id="campo-descripcion" rows="2">${escapar(a ? a.description : "")}</textarea>
    </div>
    <div class="campo">
      <label>Fecha</label>
      <input type="date" id="campo-fecha" value="${escapar(a && a.date ? a.date : new Date().toISOString().slice(0, 10))}">
    </div>
    <div class="caja-ia">
      <div class="titulo-ia">🎨 ¿Necesitas la imagen? Genérala con IA</div>
      <div class="ayuda">Copia este texto y pégalo en ChatGPT (o el generador de imágenes que uses). Ya incluye las medidas correctas. Luego sube aquí abajo la imagen que te dé.</div>
      <textarea id="campo-prompt-ia" readonly></textarea>
      <button type="button" class="boton-copiar" id="boton-copiar-prompt">📋 Copiar el texto para la IA</button>
    </div>
    <div class="campo">
      <label>${a && a.image ? "Cambiar la imagen (opcional)" : "Imagen de la publicación"}</label>
      ${a && a.image ? '<img class="img-actual" src="/' + escapar(a.image) + '" alt="Imagen actual">' : ""}
      <input type="file" id="campo-archivo" accept=".jpg,.jpeg,.png,.webp">
      <div class="nota-archivo" id="nota-archivo"></div>
      <div class="ayuda">${a && a.image
        ? "Esta de arriba es la imagen actual. Solo elige un archivo si quieres reemplazarla."
        : "Sube cualquier imagen sin preocuparte por el tamaño: el panel la recorta y ajusta solo para computadora y celular."}</div>
    </div>
    <div class="campo">
      <label>${a && a.mobileImage ? "Cambiar la imagen de celular (opcional)" : "Imagen para celular (opcional)"}</label>
      ${a && a.mobileImage ? '<img class="img-actual" style="width:100px" src="/' + escapar(a.mobileImage) + '" alt="Imagen actual para celular">' : ""}
      <input type="file" id="campo-archivo-movil" accept=".jpg,.jpeg,.png,.webp">
      <div class="ayuda">Normalmente no necesitas tocar esto: la versión de celular la fabrico yo, recortando la imagen principal. Úsalo solo si quieres una imagen distinta para celular.</div>
    </div>
    <div class="campo">
      <label>Enlace del artículo (opcional)</label>
      <input type="text" id="campo-enlace-articulo" value="${escapar(a ? a.url : "#")}">
      <div class="ayuda">Si el artículo todavía no tiene página propia, deja solo: #</div>
    </div>
    <div class="campo">
      <div class="opciones-casillas">
        <label><input type="checkbox" id="campo-portada" ${a && a.featured ? "checked" : ""}>⭐ Mostrar en la página principal de Recursos</label>
      </div>
    </div>
    <div class="campo">
      <label>Etiqueta especial (opcional)</label>
      <input type="text" id="campo-etiqueta" value="${escapar(a ? a.badge : "")}" placeholder="Ej. Próximamente">
      <div class="ayuda">Si tiene etiqueta, la tarjeta no se puede abrir. Déjalo vacío para publicaciones normales.</div>
    </div>
    <div class="pie-ventana">
      <button class="boton boton-secundario" data-cerrar>Cancelar</button>
      <button class="boton" data-guardar>Guardar</button>
    </div>
  </div>`;
}

/* ================= Guardar formulario ================= */
async function guardarFormulario(indice) {
  const editando = indice != null;
  const lista = datos[pestanaActual][pestanaActual];
  const titulo = $("#campo-titulo").value.trim();
  if (!titulo) { mostrarAviso("Escribe un título.", true); return; }

  const botonGuardar = $("#velo [data-guardar]");
  botonGuardar.disabled = true;
  botonGuardar.textContent = "Guardando…";

  try {
    const idsExistentes = lista.map((x) => x.id).filter((_, i) => !(editando && i === indice));
    const id = editando ? lista[indice].id : crearId(titulo, idsExistentes);

    let elemento;
    if (pestanaActual === "videos") {
      const youtubeId = extraerYoutubeId($("#campo-enlace").value);
      elemento = {
        id,
        title: titulo,
        youtubeId,
        youtubeUrl: youtubeId ? "https://www.youtube.com/watch?v=" + youtubeId : "",
        audience: $("#campo-publico").value,
        categories: Array.from(document.querySelectorAll('input[name="categoria"]:checked')).map((c) => c.value),
        use: document.querySelector('input[name="rol"]:checked').value,
        duration: $("#campo-duracion").value.trim(),
      };
    } else if (pestanaActual === "guias") {
      elemento = {
        id,
        title: titulo,
        description: $("#campo-descripcion").value.trim(),
        icon: $("#campo-icono").value,
        downloadUrl: editando ? lista[indice].downloadUrl : "",
      };
      const archivo = $("#campo-archivo").files[0];
      if (archivo) {
        const extension = archivo.name.slice(archivo.name.lastIndexOf(".")).toLowerCase();
        const ruta = "recursos-didacticos/descargas/" + id + extension;
        botonGuardar.textContent = "Subiendo archivo…";
        await llamarApi("POST", { ruta, base64: await archivoABase64(archivo) });
        elemento.downloadUrl = ruta;
      }
      if (!elemento.downloadUrl) {
        mostrarAviso("Elige el archivo PDF o ZIP de la guía.", true);
        botonGuardar.disabled = false;
        botonGuardar.textContent = "Guardar";
        return;
      }
    } else {
      elemento = {
        id,
        title: titulo,
        description: $("#campo-descripcion").value.trim(),
        image: editando ? lista[indice].image : "",
        mobileImage: editando ? lista[indice].mobileImage : "",
        url: $("#campo-enlace-articulo").value.trim() || "#",
        featured: $("#campo-portada").checked,
        date: $("#campo-fecha").value,
        badge: $("#campo-etiqueta").value.trim(),
      };
      const imagen = $("#campo-archivo").files[0];
      const imagenMovil = $("#campo-archivo-movil").files[0];
      if (imagen) {
        // Versión horizontal (computadora): 1600x900, recortada automáticamente.
        const rutaHorizontal = "images/recursos/" + id + ".jpg";
        botonGuardar.textContent = "Ajustando imagen…";
        await llamarApi("POST", { ruta: rutaHorizontal, base64: await procesarImagen(imagen, 1600, 900) });
        elemento.image = rutaHorizontal;
        if (!imagenMovil) {
          // Si no eligió una imagen aparte para celular, la fabricamos
          // recortando la misma imagen en cuadrado: 1254x1254.
          const rutaCuadrada = "images/recursos/" + id + "-cuadrado.jpg";
          await llamarApi("POST", { ruta: rutaCuadrada, base64: await procesarImagen(imagen, 1254, 1254) });
          elemento.mobileImage = rutaCuadrada;
        }
      }
      if (imagenMovil) {
        const rutaCuadrada = "images/recursos/" + id + "-cuadrado.jpg";
        botonGuardar.textContent = "Ajustando imagen…";
        await llamarApi("POST", { ruta: rutaCuadrada, base64: await procesarImagen(imagenMovil, 1254, 1254) });
        elemento.mobileImage = rutaCuadrada;
      }
      if (!elemento.mobileImage) elemento.mobileImage = elemento.image;
    }

    if (editando) lista[indice] = elemento;
    else lista.push(elemento);
    cerrarFormulario();
    pintarLista();
    mostrarAviso('Guardado. Recuerda pulsar "Publicar ahora" cuando termines.');
  } catch (e) {
    mostrarAviso(e.message, true);
    botonGuardar.disabled = false;
    botonGuardar.textContent = "Guardar";
  }
}

/* ================= Publicar ================= */
async function publicar() {
  const boton = $("#boton-publicar");
  boton.disabled = true;
  boton.textContent = "Publicando…";
  try {
    for (const tipo of ["videos", "guias", "articulos"]) {
      if (datos[tipo] && JSON.stringify(datos[tipo]) !== JSON.stringify(publicado[tipo])) {
        await llamarApi("PUT", { tipo, datos: datos[tipo] });
        publicado[tipo] = copiar(datos[tipo]);
      }
    }
    refrescarBarra();
    mostrarAviso("✅ ¡Publicado! La web se actualiza sola en 1-2 minutos.");
  } catch (e) {
    mostrarAviso(e.message, true);
  } finally {
    boton.disabled = false;
    boton.textContent = "Publicar ahora";
  }
}

function descartar() {
  if (!confirm("¿Descartar todos los cambios sin publicar?")) return;
  ["videos", "guias", "articulos"].forEach((t) => { datos[t] = copiar(publicado[t]); });
  pintarLista();
}

/* ================= Arranque ================= */
$("#boton-entrar").addEventListener("click", entrar);
$("#campo-clave").addEventListener("keydown", (e) => { if (e.key === "Enter") entrar(); });
$("#boton-salir").addEventListener("click", () => {
  if (hayCambios() && !confirm("Tienes cambios sin publicar. ¿Salir de todas formas?")) return;
  sessionStorage.removeItem("panel_clave");
  location.reload();
});
$("#boton-agregar").addEventListener("click", () => abrirFormulario(null));
$("#boton-publicar").addEventListener("click", publicar);
$("#boton-descartar").addEventListener("click", descartar);
document.querySelectorAll(".pestana").forEach((boton) => {
  boton.addEventListener("click", () => {
    pestanaActual = boton.dataset.tipo;
    document.querySelectorAll(".pestana").forEach((b) => b.classList.toggle("activa", b === boton));
    pintarLista();
  });
});
window.addEventListener("beforeunload", (e) => { if (hayCambios()) e.preventDefault(); });

if (clave) {
  cargarTodo()
    .then(() => {
      $("#vista-entrada").classList.add("oculto");
      $("#vista-panel").classList.remove("oculto");
      pintarLista();
    })
    .catch(() => { clave = ""; sessionStorage.removeItem("panel_clave"); });
}
</script>
</body>
</html>
